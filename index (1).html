    { day: 85, pillar: "problem", dayName: "Mon", title: "Day 85 — The Origin Story", posts: [{ platform: "x", type: "Origin story thread", content: `"5 days until the end of OBELIK's 90-day build in public sprint.\n\nToday: the origin story I haven't told yet. 🧵\n\n[Share the personal story — what moment made you realize this problem needed solving. Make it vivid, emotional, specific.]\n\nThat moment changed everything. And 85 days later, the platform exists.\n\nThe full story drops Friday.\n\n#OBELIK #BuildInPublic #FounderStory"` }, { platform: "linkedin", type: "Origin story", content: `"In 5 days, OBELIK's 90-day build in public sprint ends.\n\nBefore the finale, I want to share why this exists.\n\n[Origin story — personal, specific, emotional. The moment that made this inevitable.]\n\nEvery line of code since then has been in service of that moment.\n\n#OBELIK #FounderStory"` }]},
    { day: 86, pillar: "build", dayName: "Tue", title: "Day 86 — Full Platform Tour", posts: [{ platform: "x", type: "Video thread", content: `"Day 86. Let me show you what 90 days of building in public produced.\n\nFull OBELIK platform tour — every module, every feature, every flow.\n\n🎬 [5-minute video walkthrough]\n\nThis is what happens when you build with the community, not behind closed doors.\n\nRT to help us reach every construction professional in Africa.\n\n#OBELIK #Demo #BuildInPublic"` }, { platform: "reels", type: "Platform highlight reel", content: `[High-energy 60-sec montage of the platform — procurement, evaluation, monitoring, payments, supply chain. Fast cuts. Clean UI. Professional.]\n\n"90 days. One platform. The future of African construction.\n\nOBELIK."\n\nCAPTION: 90 days of building → this. 🏗️ #OBELIK #BuildInPublic #Demo` }]},
    { day: 87, pillar: "fintech", dayName: "Wed", title: "Day 87 — Partnership Status", posts: [{ platform: "x", type: "Transparent update", content: `"Day 87. Fintech partnership update.\n\n[Share honest status — whether it's signed, in final negotiations, or still in progress. Building in public means telling the truth.]\n\nWhatever the status, the opportunity remains the same: $232B market, zero construction escrow infrastructure, first mover advantage.\n\nThe door is open.\n\n#OBELIK #Fintech"` }]},
    { day: 88, pillar: "community", dayName: "Thu", title: "Day 88 — Community Celebration", posts: [{ platform: "x", type: "Community appreciation", content: `"Day 88 of building OBELIK in public.\n\n2 days left.\n\nBefore the finale, I want to spotlight the community that made this possible.\n\n[Thread spotlighting 5-10 specific community members — construction pros, fintech founders, fellow builders — who contributed to the journey]\n\nThis platform was built WITH you. Thank you.\n\n#OBELIK #BuildInPublic #Community"` }]},
    { day: 89, pillar: "vision", dayName: "Fri", title: "Day 89 — The Manifesto", posts: [{ platform: "x", type: "Manifesto thread", content: `"Tomorrow is Day 90.\n\nBefore the finale, here's the OBELIK manifesto:\n\nWe believe every dollar invested in African infrastructure deserves transparency.\n\nWe believe procurement should reward competence, not connections.\n\nWe believe contractors should be paid when work is verified, not when relationships demand it.\n\nWe believe project owners deserve real-time truth, not quarterly fiction.\n\nWe believe supply chains should be traceable, not faith-based.\n\nWe believe governance is not a luxury — it's the foundation.\n\nOBELIK is not just a platform. It's a standard.\n\nThe standard African construction has been waiting for.\n\nTomorrow, we celebrate 90 days. And announce what comes next.\n\n#OBELIK #Manifesto #BuildInPublic"` }, { platform: "linkedin", type: "Professional manifesto", content: `"Tomorrow marks 90 days of building OBELIK in public.\n\nBefore the finale, here's what we stand for:\n\n[Manifesto — adapted for LinkedIn's professional audience]\n\nThis journey has proven one thing: the market is ready. The demand is real. And the platform is built.\n\nTomorrow, we share what comes next.\n\n#OBELIK #BuildInPublic"` }]},
    { day: 90, pillar: "community", dayName: "Sat", title: "🔴 DAY 90 — THE GRAND FINALE", posts: [{ platform: "live", type: "X Space + IG Live + LinkedIn Live (120 min)", content: `THE GRAND FINALE: "90 Days of Building OBELIK in Public"\n\n• 0-15 min: The full journey recap — day 1 to day 90\n• 15-30 min: Complete platform demo (final version)\n• 30-45 min: Announcement #1 — Fintech partnership status\n• 45-55 min: Announcement #2 — First pilot project\n• 55-65 min: Announcement #3 — What's next (fundraise? accelerator? expansion?)\n• 65-90 min: Community celebration + Q&A\n• 90-120 min: Open mic — anyone from the community can share their take\n\nPROMOTION (start 5 days before):\n"🔴 Day 90. The Grand Finale.\n\nFor 90 days I've built OBELIK — the OS for African construction — completely in public.\n\nOn Saturday, we go live for the FINAL session.\n\nAnnouncements. Demo. Community. The full story.\n\nThis is the event of the year for African construction tech.\n\nSet your reminder. Tell everyone. 🧱\n\n#OBELIK #Day90 #BuildInPublic"` }, { platform: "x", type: "Epic thread — 90 day summary", content: `"DAY 90. 🧱\n\nNinety days ago, OBELIK was a concept note.\n\nToday it's:\n→ A working platform\n→ A growing community of [X]K+\n→ Fintech partnerships in motion\n→ Pilot projects in pipeline\n→ YC application submitted\n→ [X]M+ impressions generated\n→ [X]+ industry conversations\n\nHere's the full 90-day story, in one thread. 🧵\n\n[Thread recapping each phase — key moments, key numbers, key lessons]\n\nThis isn't the end. This is the beginning.\n\nThe build continues. The mission is the same.\n\nTransforming construction across Africa.\n\nOBELIK. 🌍\n\n#OBELIK #Day90 #BuildInPublic"` }, { platform: "linkedin", type: "Grand finale post", content: `"90 days ago, I made a commitment: build OBELIK — the operating system for African construction governance — entirely in public.\n\nToday, the 90-day sprint ends.\n\nWhat we accomplished:\n[Full summary of achievements, partnerships, community, product]\n\nWhat comes next:\n[Next phase announcement]\n\nTo everyone who followed, engaged, challenged, and supported — this platform exists because of you.\n\nThe journey continues. And it only gets bigger from here.\n\n#OBELIK #Day90 #BuildInPublic #ConstructionTech"` }]},
  ];

  phase3Days.forEach(t => days.push({ ...t, phase: 3 }));

  return days;
};

/* ───────────────────────── MAIN COMPONENT ───────────────────────── */

function OBELIKCalendar() {
  const allDays = useMemo(() => generateDays(), []);
  const [selectedPhase, setSelectedPhase] = useState(1);
  const [selectedDay, setSelectedDay] = useState(null);
  const [expandedPost, setExpandedPost] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [viewMode, setViewMode] = useState("grid"); // grid or list

  const phaseDays = allDays.filter((d) => d.phase === selectedPhase);
  const weeks = [];
  for (let i = 0; i < phaseDays.length; i += 7) {
    weeks.push(phaseDays.slice(i, i + 7));
  }

  const handleCopy = (text, idx) => {
    navigator.clipboard.writeText(text);
    setCopiedIdx(idx);
    setTimeout(() => setCopiedIdx(null), 2000);
  };

  const activeDay = selectedDay !== null ? allDays.find((d) => d.day === selectedDay) : null;

  return (
    <div style={{
      fontFamily: "'Instrument Sans', 'DM Sans', system-ui, sans-serif",
      background: "#08080A", color: "#E0E0E0", minHeight: "100vh",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideRight { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
        .fade-up { animation: fadeUp 0.3s ease-out forwards; }
        .slide-r { animation: slideRight 0.25s ease-out forwards; }
        .day-card:hover { border-color: #444 !important; transform: translateY(-1px); }
        .day-card { transition: all 0.15s ease; }
        .platform-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
      `}</style>

      {/* ─── HEADER ─── */}
      <div style={{
        borderBottom: "1px solid #1a1a1a",
        padding: "28px 20px 20px",
        background: "linear-gradient(180deg, #0f0f12 0%, #08080A 100%)",
      }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
            <div style={{
              width: 32, height: 32, borderRadius: 6,
              background: "linear-gradient(135deg, #E8432A, #D97706)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 12, color: "#fff",
            }}>OB</div>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#555", letterSpacing: 3, textTransform: "uppercase" }}>
              90-Day Content Calendar
            </span>
          </div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: "#fff", letterSpacing: -0.5, marginBottom: 6 }}>
            The OBELIK War Plan
          </h1>
          <p style={{ fontSize: 13, color: "#666", maxWidth: 600, lineHeight: 1.5 }}>
            Every day. Every platform. Every post. 90 days of building in public, attracting fintech partners, and converting attention into partnerships.
          </p>
        </div>
      </div>

      {/* ─── PHASE SELECTOR ─── */}
      <div style={{ borderBottom: "1px solid #141414", background: "#0a0a0c" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 20px", display: "flex", gap: 0 }}>
          {PHASES.map((p) => (
            <button
              key={p.id}
              onClick={() => { setSelectedPhase(p.id); setSelectedDay(null); setExpandedPost(null); }}
              style={{
                padding: "14px 20px", border: "none", cursor: "pointer",
                background: "transparent",
                borderBottom: selectedPhase === p.id ? `2px solid ${p.color}` : "2px solid transparent",
                transition: "all 0.15s",
              }}
            >
              <div style={{ fontSize: 12, fontWeight: 700, color: selectedPhase === p.id ? p.color : "#555", fontFamily: "'JetBrains Mono', monospace" }}>
                {p.name}
              </div>
              <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>{p.weeks}</div>
            </button>
          ))}
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 4 }}>
            {["grid", "list"].map((m) => (
              <button key={m} onClick={() => setViewMode(m)} style={{
                padding: "6px 12px", borderRadius: 4, border: "1px solid",
                borderColor: viewMode === m ? "#333" : "transparent",
                background: viewMode === m ? "#1a1a1a" : "transparent",
                color: viewMode === m ? "#ccc" : "#555",
                fontSize: 11, cursor: "pointer", fontWeight: 500,
              }}>{m === "grid" ? "Grid" : "List"}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ─── PHASE INFO BAR ─── */}
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "16px 20px" }}>
        <div style={{
          background: `${PHASES[selectedPhase - 1].color}08`,
          border: `1px solid ${PHASES[selectedPhase - 1].color}25`,
          borderRadius: 8, padding: "12px 16px",
          display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8,
        }}>
          <div>
            <span style={{ fontSize: 14, fontWeight: 700, color: PHASES[selectedPhase - 1].color }}>
              {PHASES[selectedPhase - 1].subtitle}
            </span>
            <span style={{ fontSize: 12, color: "#555", marginLeft: 12 }}>
              {phaseDays.length} days · {phaseDays.reduce((a, d) => a + d.posts.length, 0)} posts
            </span>
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            {Object.entries(PILLAR_COLORS).map(([k, c]) => {
              const count = phaseDays.filter((d) => d.pillar === k).length;
              if (!count) return null;
              return (
                <span key={k} style={{ fontSize: 10, color: c, fontFamily: "'JetBrains Mono', monospace" }}>
                  {PILLAR_ICONS[k]} {count}d
                </span>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 20px 40px", display: "flex", gap: 20 }}>
        {/* ─── LEFT: CALENDAR ─── */}
        <div style={{ flex: selectedDay ? "0 0 380px" : "1 1 auto", minWidth: 0, transition: "flex 0.3s" }}>
          {viewMode === "grid" ? (
            weeks.map((week, wi) => (
              <div key={wi} style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#333", fontFamily: "'JetBrains Mono', monospace", marginBottom: 8, letterSpacing: 2, textTransform: "uppercase" }}>
                  Week {Math.floor((phaseDays[0]?.day - 1) / 7) + wi + 1}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: selectedDay ? "repeat(auto-fill, minmax(140px, 1fr))" : "repeat(7, 1fr)", gap: 6 }}>
                  {week.map((d) => (
                    <div
                      key={d.day}
                      className="day-card"
                      onClick={() => { setSelectedDay(selectedDay === d.day ? null : d.day); setExpandedPost(null); }}
                      style={{
                        background: selectedDay === d.day ? "#141416" : "#0e0e10",
                        border: `1px solid ${selectedDay === d.day ? PILLAR_COLORS[d.pillar] : "#1a1a1a"}`,
                        borderRadius: 8, padding: "10px 12px", cursor: "pointer",
                        borderLeft: `3px solid ${PILLAR_COLORS[d.pillar]}`,
                      }}
                    >
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 10, fontWeight: 700, color: PILLAR_COLORS[d.pillar], fontFamily: "'JetBrains Mono', monospace" }}>
                          D{d.day}
                        </span>
                        <span style={{ fontSize: 9, color: "#444" }}>{d.dayName}</span>
                      </div>
                      <div style={{ fontSize: 11, fontWeight: 600, color: "#ccc", lineHeight: 1.3, marginBottom: 6 }}>
                        {d.title}
                      </div>
                      <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                        {d.posts.map((p, pi) => (
                          <span key={pi} style={{
                            width: 6, height: 6, borderRadius: "50%",
                            background: PLATFORM_TAGS[p.platform]?.color || "#444",
                          }} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))
          ) : (
            <div>
              {phaseDays.map((d) => (
                <div
                  key={d.day}
                  className="day-card"
                  onClick={() => { setSelectedDay(selectedDay === d.day ? null : d.day); setExpandedPost(null); }}
                  style={{
                    background: selectedDay === d.day ? "#141416" : "#0e0e10",
                    border: `1px solid ${selectedDay === d.day ? PILLAR_COLORS[d.pillar] : "#1a1a1a"}`,
                    borderRadius: 8, padding: "12px 16px", cursor: "pointer",
                    marginBottom: 4, display: "flex", alignItems: "center", gap: 14,
                    borderLeft: `3px solid ${PILLAR_COLORS[d.pillar]}`,
                  }}
                >
                  <span style={{ fontSize: 11, fontWeight: 700, color: PILLAR_COLORS[d.pillar], fontFamily: "'JetBrains Mono', monospace", width: 32, flexShrink: 0 }}>D{d.day}</span>
                  <span style={{ fontSize: 9, color: "#444", width: 28, flexShrink: 0 }}>{d.dayName}</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#ccc", flex: 1 }}>{d.title}</span>
                  <div style={{ display: "flex", gap: 4 }}>
                    {d.posts.map((p, pi) => (
                      <span key={pi} className="platform-badge" style={{ background: `${PLATFORM_TAGS[p.platform]?.color}18`, color: PLATFORM_TAGS[p.platform]?.color }}>
                        {PLATFORM_TAGS[p.platform]?.label}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ─── RIGHT: DAY DETAIL ─── */}
        {activeDay && (
          <div className="fade-up" style={{
            flex: "1 1 auto", minWidth: 0,
            position: "sticky", top: 60, alignSelf: "flex-start",
            maxHeight: "calc(100vh - 80px)", overflowY: "auto",
          }}>
            <div style={{
              background: "#0e0e10", border: "1px solid #1a1a1a", borderRadius: 12,
              overflow: "hidden",
            }}>
              {/* Day Header */}
              <div style={{
                padding: "20px 24px",
                borderBottom: "1px solid #1a1a1a",
                background: `${PILLAR_COLORS[activeDay.pillar]}06`,
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <span style={{
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700,
                    color: PILLAR_COLORS[activeDay.pillar],
                  }}>DAY {activeDay.day}</span>
                  <span style={{ fontSize: 11, color: "#444" }}>{activeDay.dayName} · {getDate(activeDay.day - 1)}</span>
                  <span style={{
                    marginLeft: "auto", fontSize: 10, padding: "3px 10px", borderRadius: 4,
                    background: `${PILLAR_COLORS[activeDay.pillar]}15`,
                    color: PILLAR_COLORS[activeDay.pillar],
                    fontWeight: 600,
                  }}>{PILLAR_ICONS[activeDay.pillar]} {PILLAR_NAMES[activeDay.pillar]}</span>
                </div>
                <h2 style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>{activeDay.title}</h2>
              </div>

              {/* Posts */}
              {activeDay.posts.map((post, i) => (
                <div key={i} style={{ borderBottom: i < activeDay.posts.length - 1 ? "1px solid #141414" : "none" }}>
                  <div
                    onClick={() => setExpandedPost(expandedPost === i ? null : i)}
                    style={{
                      padding: "14px 24px", cursor: "pointer",
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                      background: expandedPost === i ? "#121214" : "transparent",
                      transition: "background 0.15s",
                    }}
                  >
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span className="platform-badge" style={{
                        background: `${PLATFORM_TAGS[post.platform]?.color}18`,
                        color: PLATFORM_TAGS[post.platform]?.color,
                      }}>
                        {PLATFORM_TAGS[post.platform]?.label}
                      </span>
                      <span style={{ fontSize: 13, color: "#999", fontWeight: 500 }}>{post.type}</span>
                    </div>
                    <span style={{
                      fontSize: 14, color: "#333",
                      transform: expandedPost === i ? "rotate(180deg)" : "none",
                      transition: "transform 0.2s",
                    }}>▾</span>
                  </div>
                  {expandedPost === i && (
                    <div className="slide-r" style={{ padding: "0 24px 20px" }}>
                      <pre style={{
                        fontSize: 13, color: "#bbb", lineHeight: 1.7,
                        whiteSpace: "pre-wrap", wordBreak: "break-word",
                        fontFamily: "'Instrument Sans', sans-serif",
                        background: "#0a0a0c", padding: 16, borderRadius: 8,
                        border: "1px solid #141414",
                        maxHeight: 350, overflowY: "auto",
                      }}>{post.content}</pre>
                      <button
                        onClick={(e) => { e.stopPropagation(); handleCopy(post.content, `${activeDay.day}-${i}`); }}
                        style={{
                          marginTop: 10, padding: "7px 18px", borderRadius: 5,
                          background: copiedIdx === `${activeDay.day}-${i}` ? "#059669" : PILLAR_COLORS[activeDay.pillar],
                          color: "#fff", border: "none", cursor: "pointer",
                          fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
                          letterSpacing: 0.5, transition: "background 0.2s",
                        }}
                      >{copiedIdx === `${activeDay.day}-${i}` ? "✓ COPIED" : "COPY CONTENT"}</button>
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Close button */}
            <button
              onClick={() => setSelectedDay(null)}
              style={{
                marginTop: 8, width: "100%", padding: 10, borderRadius: 8,
                background: "#0e0e10", border: "1px solid #1a1a1a",
                color: "#555", fontSize: 11, cursor: "pointer",
                fontFamily: "'JetBrains Mono', monospace",
              }}
            >CLOSE PANEL</button>
          </div>
        )}
      </div>

      {/* ─── FOOTER ─── */}
      <div style={{ borderTop: "1px solid #111", padding: "16px 20px", textAlign: "center" }}>
        <p style={{ fontSize: 10, color: "#333", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1 }}>
          OBELIK · 90-DAY CONTENT WAR PLAN · CONFIDENTIAL · 2025
        </p>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(OBELIKCalendar)
    );
  </script>
</body>
</html>
